<!-- This is a static file -->
<!-- served from your routes in server.js -->

<!DOCTYPE html>
<html>
  <head>
    <title>It's Bird O'Clock!</title>
    <meta
      name="description"
      content="It's a clock! That tells time with counts of birds! It's silly!"
    />
    <link
      href="https://unpkg.com/@pqina/flip/dist/flip.min.css"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/@pqina/flip/dist/flip.min.js"></script>
    <script src="https://d3js.org/d3.v4.js"></script>
    <script src="https://d3js.org/d3-scale-chromatic.v1.min.js"></script>
    <script src="https://d3js.org/d3-geo-projection.v2.min.js"></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"
      integrity="sha512-z4OUqw38qNLpn1libAN9BsoDx6nbNFio5lA6CuTp9NlK83b89hgyCVq+N5FdBJptINztxn1Z3SaKSKUS5UP60Q=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@300;500&display=swap");
    </style>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Monoton&display=swap");
    </style>
    <!--script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.6.0/addons/p5.dom.js"></script-->
    <!--script src="/sketch.js"></script-->
  </head>
  <body>
    <style>
      body {
        background-color: rgb(255, 255, 255) !important;
        min-width: 1000px;
        overflow: hidden;
      }

      .switchButton {
        cursor: pointer;
        letter-spacing: -0.1em;
        opacity: 0.6;
        z-index: 10;
        pointer-events: auto;
      }

      .switchButton:hover {
        opacity: 1;
      }

      #wrapper {
        position: absolute;
        left: 0px;
        top: 0px;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      #intro {
        display: block;
        left: 10vw;
        top: 5vh;
        position: absolute;
        width: 32vw;
        text-align: left;
        font-family: Outfit, arial, sans-serif;
        font-size: 4vw;
        color: #665566;
        opacity: 0;
      }

      .clockBlock {
        opacity: 0;
      }

      .footer {
        display: block;
        right: 2vw;
        bottom: 2vh;
        position: absolute;
        text-align: right;
        font-family: Outfit, arial, sans-serif;
        font-size: 1.5vw;
        color: #ccbbcc;
      }

      .footer a {
        color: #aa99aa;
        text-decoration: none;
      }

      /* ---- Bird flip cards ---- */
      #birdcards {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 2vw;
        padding: 4vw 9vw;
        box-sizing: border-box;
      }

      .bird-scene {
        flex: 1;
        height: 80%;
        perspective: 1200px;
      }

      .bird-card {
        width: 100%;
        height: 100%;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 0.4s ease-in-out;
      }

      .bird-scene.is-flipped .bird-card {
        transform: rotateY(180deg);
      }

      .bird-card-face {
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
      }

      .bird-front {
        border: 4px solid white;
        box-sizing: border-box;
        overflow: hidden;
        background: rgb(90, 120, 99);
      }

      .bird-front .bird-photo {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        object-fit: cover;
        display: block;
      }

      .bird-front .bird-number {
        position: absolute;
        bottom: 0.4em;
        right: 0.5em;
        font-family: Outfit, arial, sans-serif;
        font-size: 5vw;
        font-weight: 500;
        color: white;
        text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        line-height: 1;
      }

      .bird-back {
        transform: rotateY(180deg);
        background: #2F4858;
        overflow: hidden;
        box-sizing: border-box;
        padding: 6%;
        pointer-events: auto;
      }

      .bird-sep {
        font-family: Outfit, arial, sans-serif;
        font-size: 4vw;
        color: rgba(255,255,255,0.5);
        flex: 0 0 auto;
        align-self: center;
      }

      /* Info box content (shown in back face) */
      .infoBox {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      .species {
        font-family: Outfit, arial, sans-serif;
        font-size: 2.5vw;
        font-weight: 500;
        color: white;
        cursor: pointer;
        pointer-events: auto;
        flex: 0 0 auto;
      }

      .species:hover { color: rgba(255,255,255,0.7); }

      .latin {
        font-family: Outfit, arial, sans-serif;
        font-size: 1.4vw;
        color: rgba(255,255,255,0.6);
        flex: 0 0 auto;
        margin-top: 0.3em;
      }

      .since {
        font-family: Outfit, arial, sans-serif;
        font-size: 1.4vw;
        color: white;
        flex: 0 0 auto;
        margin-top: 0.5em;
        cursor: pointer;
        pointer-events: auto;
      }

      .since:hover { color: rgba(255,255,255,0.7); }

      .mapBox {
        flex: 1;
        position: relative;
        margin-top: 1em;
        min-height: 0;
      }

      .mapSvg {
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
      }

      .tick-credits { display: none !important; }
    </style>

    <div id="controls">
      <div id="full" class="switchButton">
        <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24"><path fill="lightgrey" d="M21 9.102v5.793l3-2.896-3-2.897zm-18 5.793v-5.793l-3 2.896 3 2.897zm6.104-9.895h5.793l-2.897-3-2.896 3zm5.792 14h-5.792l2.896 3 2.896-3zm-9.896-12v10h14v-10h-14z"/></svg>
      </div>
      <div id="two" class="switchButton">⬜ ⬜</div>
      <div id="three" class="switchButton">⬜ ⬜ ⬜</div>
      
    </div>

    <div id="intro"></div>

    <div id="wrapper">
      <!-- Tick.js hidden — used only for Tick.helper.interval timing -->
      <div class="tick" data-did-init="handleTickInit" id="clock" style="display:none">
        <div data-layout="horizontal fit" id="tickBox">
          <span data-key="hours" data-view="flip"></span>
          <span data-key="minutes" data-view="flip"></span>
          <span data-key="seconds" data-view="flip"></span>
        </div>
      </div>

      <!-- Bird flip card display -->
      <div id="birdcards">
        <div class="bird-scene clockBlock" id="hours">
          <div class="bird-card">
            <div class="bird-card-face bird-front">
              <img class="bird-photo" alt="" />
              <div class="bird-number">00</div>
            </div>
            <div class="bird-card-face bird-back"></div>
          </div>
        </div>

        <div class="bird-sep">·</div>

        <div class="bird-scene clockBlock" id="mins">
          <div class="bird-card">
            <div class="bird-card-face bird-front">
              <img class="bird-photo" alt="" />
              <div class="bird-number">00</div>
            </div>
            <div class="bird-card-face bird-back"></div>
          </div>
        </div>

        <div class="bird-sep">·</div>

        <div class="bird-scene clockBlock" id="secs">
          <div class="bird-card">
            <div class="bird-card-face bird-front">
              <img class="bird-photo" alt="" />
              <div class="bird-number">00</div>
            </div>
            <div class="bird-card-face bird-back"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="footer" id ="footy">
      Built by <a href="https://jerthorp.me">Jer Thorp</a>. Code is 
      <a href="https://github.com/blprnt/birdoclock">here</a>.
    </div>

    <script>
      //intro
      var introed = false;
      function startIntro() {
        introed = true;
        console.log("INTRO! Queue fireworks!");
        var tl = anime.timeline({
          easing: "easeOutExpo",
        });
        tl.add({
          targets: "#intro",
          opacity: 1,
          left: "40vw",
          duration: 5000,
          begin: function () {
            setText("hours");
          },
        })
          .add(
            {
              targets: "#hours",
              opacity: "1",
              duration: 1500,
            },
            "-=2000"
          )
          .add({
            targets: "#intro",
            opacity: 0,
            duration: 100,
          })
          .add({
            targets: "#intro",
            left: "65vw",
            duration: 5000,
            opacity: 1,
            begin: function () {
              setText("mins");
            },
          })
          .add(
            {
              targets: "#mins",
              opacity: "1",
              duration: 1500,
            },
            "-=3000"
          )
          .add({
            targets: "#intro",
            opacity: 0,
            duration: 100,
          })
          .add({
            targets: "#intro",
            opacity: 1,
            duration: 900,
            begin: function () {
              setText("secs");
            },
          })
          .add({
            targets: "#intro",
            opacity: 0,
            duration: 50,
          })
          .add({
            targets: "#intro",
            opacity: 1,
            duration: 950,
            begin: function () {
              setText("secs");
            },
          })
          .add({
            targets: "#intro",
            opacity: 0,
            duration: 50,
          })
          .add({
            targets: "#intro",
            opacity: 1,
            duration: 950,
            begin: function () {
              setText("secs");
            },
          })
          .add({
            targets: "#intro",
            opacity: 0,
            duration: 50,
          })
          .add({
            targets: "#intro",
            opacity: 1,
            duration: 950,
            begin: function () {
              setText("secs");
            },
          })
          .add({
            targets: "#intro",
            opacity: 0,
            duration: 50,
          })
          .add({
            targets: "#intro",
            opacity: 1,
            duration: 950,
            begin: function () {
              setText("secs");
            },
          })
          .add({
            targets: "#intro",
            opacity: 0,
            duration: 50,
          })
          .add({
            targets: "#intro",
            opacity: 1,
            duration: 950,
            begin: function () {
              setText("secs");
            },
          })
          .add({
            targets: "#intro",
            opacity: 0,
            duration: 50,
          })
          .add(
            {
              targets: "#secs",
              opacity: 1,
              duration: 1500,
              complete: function () {
                document.querySelector("#intro").remove();
              },
            },
            "-=500"
          );
      }

      //text switching
      function setText(id) {
        console.log("SETTING TEXT:" + timeMap[id].species);
        let time = timeMap[id].ago;
        if (!time) time = "Not too long ago";
        let num = timeMap[id].time;
        let species = timeMap[id].species;
        if (num == 59) { 
          document.getElementById("intro").innerHTML = "For some reason no one every counts 59 birds. But let's not dwell on that."
        } else {
          document.getElementById("intro").innerHTML =
            time +
            " someone " +
            (id == "hours" ? "out there in the world" : "") +
            " counted " +
            "<span style='color:" +
            timeMap[id].color +
            "'>" +
            num +
            " " +
            species +
            "<span>.";
        }
      }
      //interface logic
      document.getElementById("two").onclick = function () {
        console.log("switch to two");
        document
          .getElementById("secs")
          .setAttribute("style", "visibility:hidden");
        document.getElementById("wrapper").setAttribute("style", "left:11vw");
      };

      document.getElementById("three").onclick = function () {
        console.log("switch to three");
        document
          .getElementById("secs")
          .setAttribute("style", "visibility:visible; opacity:1");
        document.getElementById("wrapper").setAttribute("style", "left:0px");
      };

      document.getElementById("full").onclick = function () {
        console.log("go fullscreen");
        var elem = document.documentElement;
        elem.requestFullscreen();
        document.getElementById("controls").style.visibility = "hidden";
        document.getElementById("footy").style.visibility = "hidden";
        document.querySelectorAll('.bird-scene').forEach(function(el) {
          el.style.height = "95vh";
        });
      };
      
      
      function handleTickInit(tick) {
        Tick.helper.interval(function () {
          changeTime();
          var d = Tick.helper.date();
          var h = d.getHours();
          var m = d.getMinutes();
          var s = d.getSeconds();
          tick.value = { sep: ".", hours: h < 10 ? "0" + h : h, minutes: m < 10 ? "0" + m : m, seconds: s < 10 ? "0" + s : s };
          timeMap.hours.time = h;
          timeMap.secs.time = s;
          timeMap.mins.time = m;
        });
      }

      var lastTime = new Date(0);
      var birdCache = {};
      var imageCache = [];
      var worldGeojson = null;




      function fetchAllBirds() {
        fetch("/allBirds")
          .then(function(response) { return response.json(); })
          .then(function(birds) {
            imageCache = [];
            for (var i = 0; i < birds.length; i++) {
              if (birds[i]) {
                birdCache[i] = birds[i];
                if (birds[i].image) {
                  var img = new Image();
                  img.src = birds[i].image;
                  imageCache.push(img);
                }
              }
            }
            // Place current time immediately after loading
            var now = new Date();
            if (birdCache[now.getHours()])   placeBird("hours", birdCache[now.getHours()]);
            if (birdCache[now.getMinutes()]) placeBird("mins",  birdCache[now.getMinutes()]);
            if (birdCache[now.getSeconds()]) placeBird("secs",  birdCache[now.getSeconds()]);
            // Fallback: ensure clock becomes visible even if waitForBack never resolves
            setTimeout(function() { if (!introed) startIntro(); }, 3000);
          })
          .catch(function() {});
      }

      function changeTime() {
        var now = new Date();
        try { if (now.getHours()   != lastTime.getHours()   && birdCache[now.getHours()])   placeBird("hours", birdCache[now.getHours()]);   } catch(e) { console.warn("hours placeBird failed", e); }
        try { if (now.getMinutes() != lastTime.getMinutes() && birdCache[now.getMinutes()]) placeBird("mins",  birdCache[now.getMinutes()]); } catch(e) { console.warn("mins placeBird failed",  e); }
        try { if (now.getSeconds() != lastTime.getSeconds() && birdCache[now.getSeconds()]) placeBird("secs",  birdCache[now.getSeconds()]);  } catch(e) { console.warn("secs placeBird failed",  e); }
        lastTime = now;
      }

      var timeMap = { hours: {}, mins: {}, secs: {} };

      function placeBird(section, bird) {
        if (!bird || !bird.comName || !bird.obsDt) return;

        const infoBox = document.createElement("div");
        infoBox.classList.add("infoBox");

        const newDiv = document.createElement("div");

        newDiv.classList.add("species");
        newDiv.innerHTML = bird.comName;
        timeMap[section].species = bird.comName;
        infoBox.appendChild(newDiv);
        newDiv.setAttribute("data-bird", bird.speciesCode);
        newDiv.onclick = function () {
          console.log("CLOICK");
          window.open("https://ebird.org/species/" + this.dataset.bird);
        };

        const latinDiv = document.createElement("div");

        latinDiv.classList.add("latin");
        latinDiv.innerHTML = bird.sciName;
        infoBox.appendChild(latinDiv);

        const now = new Date();
        let dt = bird.obsDt.replaceAll(" ", "T");
        const then = new Date(dt);

        //how many hours ago?
        const since = now.getTime() - then.getTime();
        let sinceHours = Math.round(since / (1000 * 60 * 60)) + 5;
        console.log(bird.comName + ":" + sinceHours);
        if (sinceHours < 0) {
          try {
          console.log("negative hours");
          sinceHours = 0;
          } catch (e) {
            console.log(e);
          }
        }
        console.log(bird.comName + ":" + sinceHours);

        

        const colors = [
          "#26AE25",
          "#009E5A",
          "#008A77",
          "#00757F",
          "#005E73",
          "#2F4858",
        ];

        let sinceMsg = sinceHours == 0 ? "Just now" : sinceHours + " hours ago";
        let ci = Math.ceil(
          Math.min(Math.pow(sinceHours, 0.33), colors.length - 1)
        );
        timeMap[section].color = colors[ci];

        var sectionEl = document.querySelector("#" + section);
        if (sectionEl) {
          sectionEl.style.setProperty("--bird-color", colors[ci]);
        }


        const sinceDiv = document.createElement("div");
        sinceDiv.classList.add("since");
        sinceDiv.innerHTML = sinceMsg;

        if (bird.subId) {
          sinceDiv.setAttribute("data-sub", bird.subId);
          sinceDiv.onclick = function () {
            console.log("CLOICK");
            window.open("https://ebird.org/checklist/" + this.dataset.sub);
          };
        }
        timeMap[section].ago = sinceMsg;

        infoBox.appendChild(sinceDiv);

        //where?
        const whereDiv = document.createElement("div");
        whereDiv.classList.add("where");
        //whereDiv.innerHTML =

        //map
        const mapBox = document.createElement("div");
        mapBox.classList.add("mapBox");

        const mapDiv = document.createElementNS(
          "http://www.w3.org/2000/svg",
          "svg"
        );

        infoBox.appendChild(mapBox);
        mapBox.appendChild(mapDiv);
        mapDiv.setAttribute("viewBox", "0 0 270 300");
        mapDiv.classList.add("mapSvg");

        var svg = d3.select(mapDiv);

        var width = 270;
        var height = 300;

        // Map and projection. Try:  d3.geoAiry() / d3.geoAitoff() / d3.geoArmadillo() / d3.geoAugust() / d3.geoAzimuthalEqualArea() / d3.geoAzimuthalEquidistant() and more
        var projection = d3
          .geoAitoff()
          .scale(width / 1.3 / Math.PI)
          .translate([width / 2, height / 2]);

        //pointer
        var markers = [{ long: bird.lng, lat: bird.lat }];

        // Draw world map onto svg selection with cached GeoJSON
        var renderGeoMap = function(data) {
          svg
            .append("g")
            .selectAll("path")
            .data(data.features)
            .enter()
            .append("path")
            .attr("fill", "#00000025")
            .attr("d", d3.geoPath().projection(projection))
            .style("stroke", "none");
          svg
            .selectAll("myCircles")
            .data(markers)
            .enter()
            .append("circle")
            .attr("cx", function(d) { return projection([d.long, d.lat])[0]; })
            .attr("cy", function(d) { return projection([d.long, d.lat])[1]; })
            .attr("r", 5)
            .style("fill", "#FFFFFF99")
            .attr("stroke", "none")
            .attr("stroke-width", 3)
            .attr("fill-opacity", 0.4);
        };
        if (worldGeojson) {
          renderGeoMap(worldGeojson);
        } else {
          fetch("https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson")
            .then(function(r) { return r.json(); })
            .then(function(data) { worldGeojson = data; renderGeoMap(data); })
            .catch(function() {});
        }

        // Update the bird card for this section
        var scene = document.querySelector('#' + section);
        if (scene) {
          // Front face: bird photo + time number
          var photo = scene.querySelector('.bird-photo');
          var numEl = scene.querySelector('.bird-number');
          if (photo) {
            if (bird.image) { photo.src = bird.image; photo.style.display = 'block'; }
            else { photo.style.display = 'none'; }
          }
          if (numEl) {
            var tv = section === 'hours' ? (new Date()).getHours() : section === 'mins' ? (new Date()).getMinutes() : (new Date()).getSeconds();
            numEl.textContent = tv < 10 ? '0' + tv : '' + tv;
          }
          // Back face: bird info
          var backFace = scene.querySelector('.bird-back');
          if (backFace) {
            backFace.innerHTML = '';
            backFace.style.backgroundColor = colors[ci];
            backFace.appendChild(infoBox);
          }
          // Flip the whole card to show the back, then flip back to front
          var card = scene.querySelector('.bird-card');
          if (card) {
            var flipMs = section === 'secs' ? 250 : 450;
            var holdMs = section === 'secs' ? 500 : section === 'mins' ? 8000 : 30000;
            clearTimeout(card._timer);
            card.style.transitionDuration = flipMs + 'ms';
            scene.classList.add('is-flipped');
            card._timer = setTimeout(function() {
              card.style.transitionDuration = flipMs + 'ms';
              scene.classList.remove('is-flipped');
            }, flipMs + holdMs);
          }
        }
        if (!introed) startIntro();
      }

      // Load all birds at startup, then refresh every 60 seconds
      fetchAllBirds();
      setInterval(fetchAllBirds, 60000);
    </script>
  </body>
</html>
