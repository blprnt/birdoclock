<!-- This is a static file -->
<!-- served from your routes in server.js -->

<!DOCTYPE html>
<html>
  <head>
    <title>It's Bird O'Clock!</title>
    <meta
      name="description"
      content="It's a clock! That tells time with counts of birds! It's silly!"
    />
    <link
      href="https://unpkg.com/@pqina/flip/dist/flip.min.css"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/@pqina/flip/dist/flip.min.js"></script>
    <script src="https://d3js.org/d3.v4.js"></script>
    <script src="https://d3js.org/d3-scale-chromatic.v1.min.js"></script>
    <script src="https://d3js.org/d3-geo-projection.v2.min.js"></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"
      integrity="sha512-z4OUqw38qNLpn1libAN9BsoDx6nbNFio5lA6CuTp9NlK83b89hgyCVq+N5FdBJptINztxn1Z3SaKSKUS5UP60Q=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@300;500&display=swap");
    </style>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Monoton&display=swap");
    </style>
    <!--script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.6.0/addons/p5.dom.js"></script-->
    <!--script src="/sketch.js"></script-->
  </head>
  <body>
    <style>
      body {
        background-color: rgb(255, 255, 255) !important;
        min-width: 1000px;
        overflow: hidden;
      }

      .switchButton {
        cursor: pointer;
        letter-spacing: -0.1em;
        opacity: 0.6;
        z-index: 10;
        pointer-events: auto;
      }

      .switchButton:hover {
        opacity: 1;
      }

      #wrapper {
        position: absolute;
        left: 0px;
        top: 0px;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      #intro {
        display: block;
        left: 10vw;
        top: 5vh;
        position: absolute;
        width: 32vw;
        text-align: left;
        font-family: Outfit, arial, sans-serif;
        font-size: 4vw;
        color: #665566;
        opacity: 0;
      }

      .clockBlock {
        opacity: 0;
      }

      .footer {
        display: block;
        right: 2vw;
        bottom: 2vh;
        position: absolute;
        text-align: right;
        font-family: Outfit, arial, sans-serif;
        font-size: 1.5vw;
        color: #ccbbcc;
      }

      .footer a {
        color: #aa99aa;
        text-decoration: none;
      }

      /* ---- Bird flip cards ---- */
      #birdcards {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 2vw;
        padding: 4vw 9vw;
        box-sizing: border-box;
      }

      .bird-scene {
        flex: 1;
        height: 80%;
        display: flex;
        flex-direction: column;
        gap: 0.6vw;
      }

      .bird-top-scene {
        flex: 3;
        perspective: 1200px;
        position: relative;
      }

      .bird-card {
        width: 100%;
        height: 100%;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 0.4s ease-in-out;
      }

      .bird-top-scene.is-flipped .bird-card {
        transform: rotateX(180deg);
      }

      .bird-card-face {
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
      }

      .bird-front {
        border: 4px solid white;
        box-sizing: border-box;
        overflow: hidden;
        background: rgb(90, 120, 99);
      }

      .bird-front .bird-photo {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        object-fit: cover;
        display: block;
      }

      .bird-front .bird-number {
        position: absolute;
        bottom: 0.4em;
        right: 0.5em;
        font-family: Outfit, arial, sans-serif;
        font-size: 5vw;
        font-weight: 500;
        color: white;
        text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        line-height: 1;
      }

      .bird-back {
        transform: rotateX(180deg);
        background: #2F4858;
        overflow: hidden;
        box-sizing: border-box;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 8%;
      }

      .back-bird-name {
        font-family: Outfit, arial, sans-serif;
        font-size: 2.8vw;
        font-weight: 500;
        color: white;
        line-height: 1.3;
      }

      .bird-bottom-card {
        flex: 1;
        border: 4px solid white;
        box-sizing: border-box;
        background: rgb(70, 95, 75);
        display: flex;
        align-items: center;
        padding: 0 1em;
        overflow: hidden;
      }

      .bird-bottom-name {
        font-family: Outfit, arial, sans-serif;
        font-size: 1.4vw;
        color: white;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .bird-sep {
        font-family: Outfit, arial, sans-serif;
        font-size: 4vw;
        color: rgba(255,255,255,0.5);
        flex: 0 0 auto;
        align-self: center;
      }

      /* Info box content (shown in back face) */
      .infoBox {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      .species {
        font-family: Outfit, arial, sans-serif;
        font-size: 2.5vw;
        font-weight: 500;
        color: white;
        cursor: pointer;
        pointer-events: auto;
        flex: 0 0 auto;
      }

      .species:hover { color: rgba(255,255,255,0.7); }

      .latin {
        font-family: Outfit, arial, sans-serif;
        font-size: 1.4vw;
        color: rgba(255,255,255,0.6);
        flex: 0 0 auto;
        margin-top: 0.3em;
      }

      .since {
        font-family: Outfit, arial, sans-serif;
        font-size: 1.4vw;
        color: white;
        flex: 0 0 auto;
        margin-top: 0.5em;
        cursor: pointer;
        pointer-events: auto;
      }

      .since:hover { color: rgba(255,255,255,0.7); }

      .mapBox {
        flex: 1;
        position: relative;
        margin-top: 1em;
        min-height: 0;
      }

      .mapSvg {
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
      }

      .tick-credits { display: none !important; }
    </style>

    <div id="controls">
      <div id="full" class="switchButton">
        <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24"><path fill="lightgrey" d="M21 9.102v5.793l3-2.896-3-2.897zm-18 5.793v-5.793l-3 2.896 3 2.897zm6.104-9.895h5.793l-2.897-3-2.896 3zm5.792 14h-5.792l2.896 3 2.896-3zm-9.896-12v10h14v-10h-14z"/></svg>
      </div>
      <div id="two" class="switchButton">⬜ ⬜</div>
      <div id="three" class="switchButton">⬜ ⬜ ⬜</div>
      
    </div>

    <div id="intro"></div>

    <div id="wrapper">
      <!-- Tick.js hidden — used only for Tick.helper.interval timing -->
      <div class="tick" data-did-init="handleTickInit" id="clock" style="display:none">
        <div data-layout="horizontal fit" id="tickBox">
          <span data-key="hours" data-view="flip"></span>
          <span data-key="minutes" data-view="flip"></span>
          <span data-key="seconds" data-view="flip"></span>
        </div>
      </div>

      <!-- Bird flip card display -->
      <div id="birdcards">
        <div class="bird-scene clockBlock" id="hours">
          <div class="bird-top-scene">
            <div class="bird-card">
              <div class="bird-card-face bird-front">
                <img class="bird-photo" alt="" />
                <div class="bird-number">00</div>
              </div>
              <div class="bird-card-face bird-back"></div>
            </div>
          </div>
          <div class="bird-bottom-card">
            <div class="bird-bottom-name"></div>
          </div>
        </div>

        <div class="bird-sep">·</div>

        <div class="bird-scene clockBlock" id="mins">
          <div class="bird-top-scene">
            <div class="bird-card">
              <div class="bird-card-face bird-front">
                <img class="bird-photo" alt="" />
                <div class="bird-number">00</div>
              </div>
              <div class="bird-card-face bird-back"></div>
            </div>
          </div>
          <div class="bird-bottom-card">
            <div class="bird-bottom-name"></div>
          </div>
        </div>

        <div class="bird-sep">·</div>

        <div class="bird-scene clockBlock" id="secs">
          <div class="bird-top-scene">
            <div class="bird-card">
              <div class="bird-card-face bird-front">
                <img class="bird-photo" alt="" />
                <div class="bird-number">00</div>
              </div>
              <div class="bird-card-face bird-back"></div>
            </div>
          </div>
          <div class="bird-bottom-card">
            <div class="bird-bottom-name"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="footer" id ="footy">
      Built by <a href="https://jerthorp.me">Jer Thorp</a>. Code is 
      <a href="https://github.com/blprnt/birdoclock">here</a>.
    </div>

    <script>
      //intro
      var introed = false;
      function startIntro() {
        introed = true;
        console.log("INTRO! Queue fireworks!");
        var tl = anime.timeline({
          easing: "easeOutExpo",
        });
        tl.add({
          targets: "#intro",
          opacity: 1,
          left: "40vw",
          duration: 5000,
          begin: function () {
            setText("hours");
          },
        })
          .add(
            {
              targets: "#hours",
              opacity: "1",
              duration: 1500,
            },
            "-=2000"
          )
          .add({
            targets: "#intro",
            opacity: 0,
            duration: 100,
          })
          .add({
            targets: "#intro",
            left: "65vw",
            duration: 5000,
            opacity: 1,
            begin: function () {
              setText("mins");
            },
          })
          .add(
            {
              targets: "#mins",
              opacity: "1",
              duration: 1500,
            },
            "-=3000"
          )
          .add({
            targets: "#intro",
            opacity: 0,
            duration: 100,
          })
          .add({
            targets: "#intro",
            opacity: 1,
            duration: 900,
            begin: function () {
              setText("secs");
            },
          })
          .add({
            targets: "#intro",
            opacity: 0,
            duration: 50,
          })
          .add({
            targets: "#intro",
            opacity: 1,
            duration: 950,
            begin: function () {
              setText("secs");
            },
          })
          .add({
            targets: "#intro",
            opacity: 0,
            duration: 50,
          })
          .add({
            targets: "#intro",
            opacity: 1,
            duration: 950,
            begin: function () {
              setText("secs");
            },
          })
          .add({
            targets: "#intro",
            opacity: 0,
            duration: 50,
          })
          .add({
            targets: "#intro",
            opacity: 1,
            duration: 950,
            begin: function () {
              setText("secs");
            },
          })
          .add({
            targets: "#intro",
            opacity: 0,
            duration: 50,
          })
          .add({
            targets: "#intro",
            opacity: 1,
            duration: 950,
            begin: function () {
              setText("secs");
            },
          })
          .add({
            targets: "#intro",
            opacity: 0,
            duration: 50,
          })
          .add({
            targets: "#intro",
            opacity: 1,
            duration: 950,
            begin: function () {
              setText("secs");
            },
          })
          .add({
            targets: "#intro",
            opacity: 0,
            duration: 50,
          })
          .add(
            {
              targets: "#secs",
              opacity: 1,
              duration: 1500,
              complete: function () {
                document.querySelector("#intro").remove();
              },
            },
            "-=500"
          );
      }

      //text switching
      function setText(id) {
        console.log("SETTING TEXT:" + timeMap[id].species);
        let time = timeMap[id].ago;
        if (!time) time = "Not too long ago";
        let num = timeMap[id].time;
        let species = timeMap[id].species;
        if (num == 59) { 
          document.getElementById("intro").innerHTML = "For some reason no one every counts 59 birds. But let's not dwell on that."
        } else {
          document.getElementById("intro").innerHTML =
            time +
            " someone " +
            (id == "hours" ? "out there in the world" : "") +
            " counted " +
            "<span style='color:" +
            timeMap[id].color +
            "'>" +
            num +
            " " +
            species +
            "<span>.";
        }
      }
      //interface logic
      document.getElementById("two").onclick = function () {
        console.log("switch to two");
        document
          .getElementById("secs")
          .setAttribute("style", "visibility:hidden");
        document.getElementById("wrapper").setAttribute("style", "left:11vw");
      };

      document.getElementById("three").onclick = function () {
        console.log("switch to three");
        document
          .getElementById("secs")
          .setAttribute("style", "visibility:visible; opacity:1");
        document.getElementById("wrapper").setAttribute("style", "left:0px");
      };

      document.getElementById("full").onclick = function () {
        console.log("go fullscreen");
        var elem = document.documentElement;
        elem.requestFullscreen();
        document.getElementById("controls").style.visibility = "hidden";
        document.getElementById("footy").style.visibility = "hidden";
        document.querySelectorAll('.bird-scene').forEach(function(el) {
          el.style.height = "95vh";
        });
      };
      
      
      function handleTickInit(tick) {
        Tick.helper.interval(function () {
          changeTime();
          var d = Tick.helper.date();
          var h = d.getHours();
          var m = d.getMinutes();
          var s = d.getSeconds();
          tick.value = { sep: ".", hours: h < 10 ? "0" + h : h, minutes: m < 10 ? "0" + m : m, seconds: s < 10 ? "0" + s : s };
          timeMap.hours.time = h;
          timeMap.secs.time = s;
          timeMap.mins.time = m;
        });
      }

      var lastTime = new Date(0);
      var birdCache = {};
      var imageCache = [];
      var worldGeojson = null;




      function fetchAllBirds() {
        fetch("/allBirds")
          .then(function(response) { return response.json(); })
          .then(function(birds) {
            imageCache = [];
            for (var i = 0; i < birds.length; i++) {
              if (birds[i]) {
                birdCache[i] = birds[i];
                if (birds[i].image) {
                  var img = new Image();
                  img.src = birds[i].image;
                  imageCache.push(img);
                }
              }
            }
            // Place current time immediately after loading
            var now = new Date();
            if (birdCache[now.getHours()])   placeBird("hours", birdCache[now.getHours()]);
            if (birdCache[now.getMinutes()]) placeBird("mins",  birdCache[now.getMinutes()]);
            if (birdCache[now.getSeconds()]) placeBird("secs",  birdCache[now.getSeconds()]);
            // Fallback: ensure clock becomes visible even if waitForBack never resolves
            setTimeout(function() { if (!introed) startIntro(); }, 3000);
          })
          .catch(function() {});
      }

      function changeTime() {
        var now = new Date();
        try { if (now.getHours()   != lastTime.getHours()   && birdCache[now.getHours()])   placeBird("hours", birdCache[now.getHours()]);   } catch(e) { console.warn("hours placeBird failed", e); }
        try { if (now.getMinutes() != lastTime.getMinutes() && birdCache[now.getMinutes()]) placeBird("mins",  birdCache[now.getMinutes()]); } catch(e) { console.warn("mins placeBird failed",  e); }
        try { if (now.getSeconds() != lastTime.getSeconds() && birdCache[now.getSeconds()]) placeBird("secs",  birdCache[now.getSeconds()]);  } catch(e) { console.warn("secs placeBird failed",  e); }
        lastTime = now;
      }

      var timeMap = { hours: {}, mins: {}, secs: {} };

      function placeBird(section, bird) {
        if (!bird || !bird.comName || !bird.obsDt) return;

        const now = new Date();
        let dt = bird.obsDt.replaceAll(" ", "T");
        const then = new Date(dt);
        const since = now.getTime() - then.getTime();
        let sinceHours = Math.round(since / (1000 * 60 * 60)) + 5;
        if (sinceHours < 0) sinceHours = 0;

        const colors = ["#26AE25", "#009E5A", "#008A77", "#00757F", "#005E73", "#2F4858"];
        let ci = Math.ceil(Math.min(Math.pow(sinceHours, 0.33), colors.length - 1));
        timeMap[section].color = colors[ci];
        timeMap[section].species = bird.comName;

        var sectionEl = document.querySelector("#" + section);
        if (sectionEl) sectionEl.style.setProperty("--bird-color", colors[ci]);

        var scene = document.querySelector('#' + section);
        if (!scene) { if (!introed) startIntro(); return; }

        var topScene = scene.querySelector('.bird-top-scene');
        var card = topScene && topScene.querySelector('.bird-card');
        var backFace = topScene && topScene.querySelector('.bird-back');
        var photo = topScene && topScene.querySelector('.bird-photo');
        var numEl = topScene && topScene.querySelector('.bird-number');
        var bottomName = scene.querySelector('.bird-bottom-name');

        // Back face: incoming bird's name (announced during the flip)
        if (backFace) {
          backFace.style.backgroundColor = colors[ci];
          var nameEl = document.createElement('div');
          nameEl.className = 'back-bird-name';
          nameEl.textContent = bird.comName;
          backFace.innerHTML = '';
          backFace.appendChild(nameEl);
        }

        // Flip the top card on horizontal axis to reveal the new bird's name
        if (card && topScene) {
          var flipMs = section === 'secs' ? 250 : 400;
          var holdMs = section === 'secs' ? 800 : section === 'mins' ? 5000 : 20000;
          clearTimeout(card._timer);
          card.style.transitionDuration = flipMs + 'ms';
          topScene.classList.add('is-flipped');
          card._timer = setTimeout(function() {
            // Update front face while card shows its back
            if (photo) {
              if (bird.image) { photo.src = bird.image; photo.style.display = 'block'; }
              else { photo.style.display = 'none'; }
            }
            if (numEl) {
              var tv = section === 'hours' ? (new Date()).getHours() :
                       section === 'mins'  ? (new Date()).getMinutes() : (new Date()).getSeconds();
              numEl.textContent = tv < 10 ? '0' + tv : '' + tv;
            }
            if (bottomName) bottomName.textContent = bird.comName;
            // Flip back to reveal the updated front
            card.style.transitionDuration = flipMs + 'ms';
            topScene.classList.remove('is-flipped');
          }, flipMs + holdMs);
        }

        if (!introed) startIntro();
      }

      // Load all birds at startup, then refresh every 60 seconds
      fetchAllBirds();
      setInterval(fetchAllBirds, 60000);
    </script>
  </body>
</html>
